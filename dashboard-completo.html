<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard CPE 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+Pro:wght@600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --preto: #373435;
    --dourado: #A08F63;
    --dourado-claro: #C4B287;
    --bg: #FAF8F3;
    --bg-card: #FFFFFF;
    --bg-soft: #F2EFE6;
    --texto: #373435;
    --texto-soft: #5A5A5A;
    --texto-mute: #8A8A8A;
    --linha: #E0DCD0;
    --positivo: #6B5B3A;
    --aviso: #B47B2A;
    --perigo: #8B1A1A;
    --sombra: 0 1px 3px rgba(55,52,53,0.04), 0 4px 16px rgba(55,52,53,0.04);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--texto);
    line-height: 1.5;
    min-height: 100vh;
  }

  .header {
    background: var(--preto);
    color: #FFFFFF;
    padding: 20px 40px;
    border-bottom: 3px solid var(--dourado);
  }

  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    max-width: 1600px;
    margin: 0 auto;
    gap: 24px;
  }

  .header-info h1 {
    font-family: 'Source Serif Pro', serif;
    font-size: 26px;
    font-weight: 700;
    margin-bottom: 2px;
    color: #FFFFFF;
  }

  .header-info .subtitle {
    font-size: 12px;
    opacity: 0.8;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--dourado-claro);
  }

  .header-controls {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 6px;
  }

  .refresh-btn {
    background: var(--dourado);
    color: var(--preto);
    border: none;
    padding: 10px 18px;
    border-radius: 4px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .refresh-btn:hover { background: var(--dourado-claro); }
  .refresh-btn:disabled { opacity: 0.6; cursor: not-allowed; }
  .refresh-btn.loading .icon { animation: spin 1s linear infinite; }

  @keyframes spin { to { transform: rotate(360deg); } }

  .last-update {
    font-size: 10px;
    opacity: 0.75;
    font-family: 'JetBrains Mono', monospace;
    color: #FFFFFF;
  }

  .status-line {
    background: rgba(255,255,255,0.08);
    padding: 8px 40px;
    text-align: center;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    color: #FFFFFF;
  }

  .status-line.error { background: var(--perigo); }
  .status-line.success { background: rgba(160, 143, 99, 0.4); }
  .status-line.loading { background: rgba(160, 143, 99, 0.3); }

  .main {
    max-width: 1600px;
    margin: 0 auto;
    padding: 28px 40px;
  }

  .filters {
    background: var(--bg-card);
    border: 1px solid var(--linha);
    border-radius: 6px;
    padding: 20px 24px;
    margin-bottom: 24px;
    display: grid;
    grid-template-columns: repeat(4, 1fr) auto;
    gap: 20px;
    box-shadow: var(--sombra);
  }

  .filter-group { display: flex; flex-direction: column; gap: 6px; }
  .filter-group label {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--texto-mute);
  }

  .filter-group select {
    background: var(--bg);
    border: 1px solid var(--linha);
    padding: 8px 12px;
    border-radius: 4px;
    font-family: inherit;
    font-size: 13px;
    color: var(--texto);
    cursor: pointer;
  }

  .filter-group select:focus { outline: none; border-color: var(--preto); }

  .view-toggle { display: flex; flex-direction: column; gap: 6px; }
  .toggle-buttons {
    display: flex;
    background: var(--bg-soft);
    border-radius: 4px;
    padding: 2px;
    border: 1px solid var(--linha);
  }

  .toggle-btn {
    background: transparent;
    border: none;
    padding: 7px 12px;
    border-radius: 3px;
    font-family: inherit;
    font-size: 11px;
    font-weight: 600;
    color: var(--texto-soft);
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }

  .toggle-btn.active { background: var(--preto); color: #FFFFFF; }

  .section-title {
    font-family: 'Source Serif Pro', serif;
    font-size: 20px;
    font-weight: 700;
    margin: 32px 0 16px;
    padding-bottom: 8px;
    border-bottom: 2px solid var(--dourado);
    display: flex;
    align-items: baseline;
    gap: 12px;
    color: var(--texto);
  }

  .section-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--dourado);
    font-weight: 500;
  }

  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 16px;
  }

  .kpi {
    background: var(--bg-card);
    border: 1px solid var(--linha);
    border-radius: 6px;
    padding: 18px 20px;
    box-shadow: var(--sombra);
    position: relative;
    overflow: hidden;
  }

  .kpi::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px;
    height: 100%;
    background: var(--preto);
  }

  .kpi.gold::before { background: var(--dourado); }
  .kpi.positivo::before { background: var(--positivo); }

  .kpi-label {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--texto-mute);
    margin-bottom: 6px;
  }

  .kpi-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 19px;
    font-weight: 600;
    margin-bottom: 4px;
    letter-spacing: -0.4px;
    color: var(--texto);
  }

  .kpi-detail { font-size: 11px; color: var(--texto-soft); line-height: 1.4; }

  .charts-grid {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 16px;
  }

  .chart-card {
    background: var(--bg-card);
    border: 1px solid var(--linha);
    border-radius: 6px;
    padding: 20px 24px;
    box-shadow: var(--sombra);
  }

  .chart-title {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--texto-soft);
    margin-bottom: 16px;
  }

  .chart-container { position: relative; height: 320px; }

  .table-card {
    background: var(--bg-card);
    border: 1px solid var(--linha);
    border-radius: 6px;
    overflow: hidden;
    box-shadow: var(--sombra);
    margin-top: 16px;
  }

  .table-header {
    padding: 18px 24px;
    border-bottom: 1px solid var(--linha);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .table-header h3 {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--texto-soft);
  }

  .table-meta {
    font-size: 11px;
    color: var(--texto-mute);
    font-family: 'JetBrains Mono', monospace;
  }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead { background: var(--bg-soft); }
  th {
    padding: 12px 14px;
    text-align: left;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--texto-soft);
    border-bottom: 1px solid var(--linha);
    white-space: nowrap;
  }

  th.num { text-align: right; }
  td { padding: 12px 14px; border-bottom: 1px solid var(--linha); color: var(--texto); }
  td.num {
    text-align: right;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
  }

  td.code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--texto-soft);
  }

  tbody tr:hover { background: var(--bg-soft); }
  tbody tr:last-child td { border-bottom: none; }

  .tag {
    display: inline-block;
    padding: 3px 9px;
    border-radius: 3px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }

  .tag-dprf { background: #D0DCE6; color: #1F3D52; }
  .tag-der { background: #E6D5C3; color: #5C3D1F; }
  .tag-semad { background: #D4DACE; color: #1B5E20; }
  .tag-contratual { background: #E8DCC0; color: #5C4519; }
  .tag-essencial { background: #D9D6CD; color: var(--preto); }

  .tag-vigente { background: #C8E6C9; color: #1B5E20; border: 1px solid #66BB6A; }
  .tag-laranja { background: #FFCC80; color: #5D2E00; border: 1px solid #E67E22; font-weight: 700; }
  .tag-vermelho { background: #FFAB91; color: #B71C1C; border: 1px solid #C62828; font-weight: 700; animation: pulse 2s infinite; }

  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.75; } }

  .bar-mini {
    width: 100%;
    height: 5px;
    background: var(--bg-soft);
    border-radius: 3px;
    overflow: hidden;
    margin-top: 4px;
  }

  .bar-fill { height: 100%; transition: width 0.4s ease; }
  .bar-low { background: var(--positivo); }
  .bar-mid { background: var(--aviso); }
  .bar-high { background: var(--perigo); }

  .pct-mini {
    font-size: 10px;
    color: var(--texto-mute);
    font-family: 'JetBrains Mono', monospace;
  }

  .empty-state {
    text-align: center;
    padding: 60px 24px;
    color: var(--texto-mute);
  }

  .empty-state h2 {
    font-family: 'Source Serif Pro', serif;
    font-size: 22px;
    margin-bottom: 12px;
  }

  .footer {
    max-width: 1600px;
    margin: 40px auto 0;
    padding: 24px 40px 32px;
    border-top: 1px solid var(--linha);
    font-size: 11px;
    color: var(--texto-mute);
    display: flex;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }

  @media (max-width: 1200px) {
    .kpi-grid { grid-template-columns: repeat(3, 1fr); }
    .charts-grid { grid-template-columns: 1fr; }
    .filters { grid-template-columns: repeat(2, 1fr); }
  }

  @media (max-width: 768px) {
    .header, .main, .status-line { padding-left: 20px; padding-right: 20px; }
    .kpi-grid { grid-template-columns: 1fr; }
    .filters { grid-template-columns: 1fr; }
    .header-top { flex-direction: column; align-items: flex-start; }
  }
</style>
</head>
<body>

<header class="header">
  <div class="header-top">
    <div class="header-info">
      <div class="subtitle">Estado-Maior do CPE | Exercício 2026</div>
      <h1>Dashboard Orçamentário</h1>
    </div>
    <div class="header-controls">
      <button class="refresh-btn" onclick="carregarDados()">
        <span class="icon">🔄</span>
        <span>Atualizar Dados</span>
      </button>
      <div class="last-update" id="last-update">—</div>
    </div>
  </div>
</header>

<div class="status-line" id="status-line">Carregando dados...</div>

<main class="main" id="main">
  <div class="empty-state">
    <h2>Carregando...</h2>
  </div>
</main>

<script>
const CONFIG = {
  CONVENIOS: {
    DPRF: 13086500.92,
    DER: 9000000.00,
    SEMAD: 12500000.00
  }
};

let state = {
  rawData: {},
  data: { plano: [], execucao: [], contratos: [], recebimentos: [] },
  filtros: { fonte: 'TODAS', elemento: 'TODOS', tipo: 'TODOS', status: 'TODOS', visao: 'absoluto' }
};

let chartElementos = null;
let chartTipos = null;

async function carregarDados() {
  const btn = document.querySelector('.refresh-btn');
  btn.disabled = true;
  btn.classList.add('loading');
  
  setStatus('Buscando dados...', 'loading');
  
  try {
    const response = await fetch('/api/dados');
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    
    const json = await response.json();
    if (json.status !== 'ok') throw new Error(json.mensagem || 'Erro desconhecido');
    
    processarDados(json.data);
    setStatus('✓ Dados carregados com sucesso', 'success');
    atualizarTimestamp();
    renderizarDashboard();
    
  } catch (err) {
    console.error(err);
    setStatus(`⚠ Erro: ${err.message}`, 'error');
  } finally {
    btn.disabled = false;
    btn.classList.remove('loading');
  }
}

function processarDados(data) {
  state.rawData = data;
  state.data = { plano: [], execucao: [], contratos: [], recebimentos: [] };
  
  if (data.cpe) {
    for (const [aba, registros] of Object.entries(data.cpe)) {
      const nomeNorm = aba.toLowerCase();
      if (nomeNorm.includes('plano') || nomeNorm.includes('programa') || nomeNorm.includes('superavit')) {
        state.data.plano = state.data.plano.concat(registros);
      } else if (nomeNorm.includes('execu') || nomeNorm.includes('movimen')) {
        state.data.execucao = state.data.execucao.concat(registros);
      } else if (nomeNorm.includes('contrat')) {
        state.data.contratos = state.data.contratos.concat(registros);
      } else if (nomeNorm.includes('receb') || nomeNorm.includes('descent')) {
        state.data.recebimentos = state.data.recebimentos.concat(registros);
      }
    }
  }
}

function setStatus(msg, tipo) {
  const el = document.getElementById('status-line');
  el.textContent = msg;
  el.className = 'status-line ' + (tipo || 'default');
}

function atualizarTimestamp() {
  const agora = new Date().toLocaleString('pt-BR', {
    day: '2-digit', month: '2-digit', year: 'numeric',
    hour: '2-digit', minute: '2-digit'
  });
  document.getElementById('last-update').textContent = 'Atualizado: ' + agora;
}

const fmtBR = (v) => (v === null || v === undefined || isNaN(v)) ? 'R$ -' : 'R$ ' + Number(v).toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2});
const fmtBRcompact = (v) => {
  if (v === null || v === undefined || isNaN(v)) return 'R$ -';
  const abs = Math.abs(Number(v));
  if (abs >= 1e6) return 'R$ ' + (Number(v)/1e6).toFixed(2).replace('.',',') + 'M';
  if (abs >= 1e3) return 'R$ ' + (Number(v)/1e3).toFixed(1).replace('.',',') + 'K';
  return 'R$ ' + Number(v).toLocaleString('pt-BR', {maximumFractionDigits:0});
};
const fmtPct = (v) => (v === null || v === undefined || isNaN(v)) ? '-' : (v*100).toFixed(1).replace('.',',') + '%';

const normalizaFonte = (s) => {
  if (!s) return '';
  const str = String(s).toUpperCase();
  if (str.includes('DPRF') || str.includes('73')) return 'DPRF';
  if (str.includes('DER') || str.includes('83')) return 'DER';
  if (str.includes('SEMAD') || str.includes('52')) return 'SEMAD';
  return str;
};

const getField = (obj, ...keys) => {
  for (const k of keys) {
    if (obj[k] !== undefined && obj[k] !== null && obj[k] !== '') return obj[k];
  }
  return null;
};

const num = (v) => {
  if (v === null || v === undefined || v === '') return 0;
  if (typeof v === 'number') return v;
  const str = String(v).replace(/[R\$\s]/g, '').replace(/\./g, '').replace(',', '.');
  const n = parseFloat(str);
  return isNaN(n) ? 0 : n;
};

function renderizarDashboard() {
  const main = document.getElementById('main');
  
  main.innerHTML = `
    <div class="filters">
      <div class="filter-group">
        <label>Fonte de Recurso</label>
        <select id="filter-fonte">
          <option value="TODAS">Todas</option>
          <option value="DPRF">DPRF (73.10)</option>
          <option value="DER">DER (83.20)</option>
          <option value="SEMAD">SEMAD (52.20)</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Elemento</label>
        <select id="filter-elemento">
          <option value="TODOS">Todos</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Tipo de Despesa</label>
        <select id="filter-tipo">
          <option value="TODOS">Todos</option>
          <option value="CONTRATUAL">Contratual</option>
          <option value="ESSENCIAL">Essencial</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Status</label>
        <select id="filter-status">
          <option value="TODOS">Todos</option>
        </select>
      </div>
      <div class="view-toggle">
        <label>Visão</label>
        <div class="toggle-buttons">
          <button class="toggle-btn" data-view="contabil">Contábil</button>
          <button class="toggle-btn" data-view="financeira">Financeira</button>
          <button class="toggle-btn active" data-view="absoluto">Absoluto</button>
        </div>
      </div>
    </div>

    <h2 class="section-title">
      <span class="section-num">01</span>
      Resumo Executivo
    </h2>
    <div class="kpi-grid" id="kpis-principais"></div>

    <h2 class="section-title">
      <span class="section-num">02</span>
      Distribuição Orçamentária
    </h2>
    <div class="charts-grid">
      <div class="chart-card">
        <div class="chart-title">Execução por Elemento de Despesa</div>
        <div class="chart-container">
          <canvas id="chart-elementos"></canvas>
        </div>
      </div>
      <div class="chart-card">
        <div class="chart-title">Distribuição Contratual vs Essencial</div>
        <div class="chart-container">
          <canvas id="chart-tipos"></canvas>
        </div>
      </div>
    </div>

    <h2 class="section-title">
      <span class="section-num">03</span>
      Detalhamento por Elemento
    </h2>
    <div class="table-card">
      <div class="table-header">
        <h3>Posição por Elemento de Despesa</h3>
        <span class="table-meta" id="tabela-meta">—</span>
      </div>
      <div style="overflow-x: auto;">
        <table id="tabela-elementos">
          <thead>
            <tr>
              <th>Fonte</th>
              <th>Elemento</th>
              <th>Descrição</th>
              <th>Tipo</th>
              <th class="num">Plano (R$)</th>
              <th class="num">Empenhado (R$)</th>
              <th class="num">Liquidado (R$)</th>
              <th class="num">Pago (R$)</th>
              <th class="num">Saldo (R$)</th>
              <th>Execução</th>
            </tr>
          </thead>
          <tbody id="tbody-elementos"></tbody>
        </table>
      </div>
    </div>

    <h2 class="section-title">
      <span class="section-num">04</span>
      Contratos
    </h2>
    <div class="table-card">
      <div class="table-header">
        <h3>Contratos com Etiquetas de Vigência</h3>
        <span class="table-meta" id="contratos-meta">—</span>
      </div>
      <div style="overflow-x: auto;">
        <table id="tabela-contratos">
          <thead>
            <tr>
              <th>Elemento</th>
              <th>Empresa</th>
              <th>Objeto</th>
              <th>Fim Vigência</th>
              <th class="num">Dias</th>
              <th class="num">Valor Total (R$)</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="tbody-contratos"></tbody>
        </table>
      </div>
    </div>

    <footer class="footer">
      <div>Dashboard CPE 2026 — Conectado ao Google Sheets</div>
    </footer>
  `;
  
  ['filter-fonte', 'filter-elemento', 'filter-tipo', 'filter-status'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.addEventListener('change', (e) => {
      const key = id.replace('filter-', '');
      state.filtros[key] = e.target.value;
      atualizarVisualizacao();
    });
  });
  
  document.querySelectorAll('.toggle-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      state.filtros.visao = e.target.dataset.view;
      atualizarVisualizacao();
    });
  });
  
  popularElementos();
  atualizarVisualizacao();
}

function popularElementos() {
  const select = document.getElementById('filter-elemento');
  if (!select) return;
  const elementos = [...new Set(state.data.plano.map(p => getField(p, 'ELEMENTO') || ''))].filter(Boolean).sort();
  select.innerHTML = '<option value="TODOS">Todos</option>' + elementos.map(e => `<option value="${e}">${e}</option>`).join('');
}

function aplicarFiltros(dataset) {
  const f = state.filtros;
  return dataset.filter(item => {
    const fonte = normalizaFonte(getField(item, 'FONTE'));
    const elemento = getField(item, 'ELEMENTO') || '';
    const tipo = String(getField(item, 'TIPO DESPESA', 'TIPO') || '').toUpperCase();
    
    if (f.fonte !== 'TODAS' && fonte !== f.fonte) return false;
    if (f.elemento !== 'TODOS' && elemento !== f.elemento) return false;
    if (f.tipo !== 'TODOS' && tipo && !tipo.includes(f.tipo)) return false;
    return true;
  });
}

function calcularPorElemento() {
  const plano = aplicarFiltros(state.data.plano);
  return plano.map(item => {
    const fonte = normalizaFonte(getField(item, 'FONTE'));
    const elemento = getField(item, 'ELEMENTO') || '';
    const descricao = getField(item, 'DESCRIÇÃO ELEMENTO', 'DESCRICAO ELEMENTO', 'DESCRIÇÃO') || '';
    const tipoDespesa = String(getField(item, 'TIPO DESPESA', 'TIPO') || 'ESSENCIAL').toUpperCase();
    const valor = num(getField(item, 'VALOR ANUAL AUTORIZADO', 'VALOR', 'TOTAL'));
    
    const execItems = state.data.execucao.filter(e => 
      normalizaFonte(getField(e, 'FONTE')) === fonte && 
      getField(e, 'ELEMENTO') === elemento
    );
    
    const empenhado = execItems.filter(e => String(getField(e, 'TIPO MOVIMENTO') || '').toUpperCase() === 'EMPENHO').reduce((s,e) => s + num(getField(e, 'VALOR')), 0);
    const liquidado = execItems.filter(e => String(getField(e, 'TIPO MOVIMENTO') || '').toUpperCase().includes('LIQUIDA')).reduce((s,e) => s + num(getField(e, 'VALOR')), 0);
    const pago = execItems.filter(e => String(getField(e, 'TIPO MOVIMENTO') || '').toUpperCase() === 'PAGAMENTO').reduce((s,e) => s + num(getField(e, 'VALOR')), 0);
    
    const saldoContabil = valor - empenhado;
    const saldoFinanceira = valor - pago;
    const saldoAbsoluto = saldoContabil + saldoFinanceira;
    
    return { fonte, elemento, descricao, tipoDespesa, valor, empenhado, liquidado, pago, saldoContabil, saldoFinanceira, saldoAbsoluto, execPct: valor > 0 ? empenhado / valor : 0 };
  });
}

function calcularResumo() {
  const dados = calcularPorElemento();
  const planoTotal = dados.reduce((s,d) => s + d.valor, 0);
  const empenhado = dados.reduce((s,d) => s + d.empenhado, 0);
  const liquidado = dados.reduce((s,d) => s + d.liquidado, 0);
  const pago = dados.reduce((s,d) => s + d.pago, 0);
  
  let convenioTotal = state.filtros.fonte === 'TODAS' ? 
    CONFIG.CONVENIOS.DPRF + CONFIG.CONVENIOS.DER + CONFIG.CONVENIOS.SEMAD : 
    CONFIG.CONVENIOS[state.filtros.fonte] || 0;
  
  const saldoContabil = planoTotal - empenhado;
  const saldoFinanceira = planoTotal - pago;
  const saldoAbsoluto = saldoContabil + saldoFinanceira;
  
  return { convenioTotal, planoTotal, empenhado, liquidado, pago, saldoContabil, saldoFinanceira, saldoAbsoluto, aLiquidar: empenhado - liquidado, aPagar: liquidado - pago, execPct: planoTotal > 0 ? empenhado / planoTotal : 0 };
}

function renderKPIs() {
  const r = calcularResumo();
  const visao = state.filtros.visao;
  
  let saldoLabel, saldoValue, saldoDetail;
  if (visao === 'contabil') { saldoLabel = 'Saldo Contábil'; saldoValue = r.saldoContabil; saldoDetail = 'Plano − Empenhado'; }
  else if (visao === 'financeira') { saldoLabel = 'Saldo Financeiro'; saldoValue = r.saldoFinanceira; saldoDetail = 'Plano − Pago'; }
  else { saldoLabel = 'Saldo Absoluto'; saldoValue = r.saldoAbsoluto; saldoDetail = 'Contábil + Financeira'; }
  
  const kpis = [
    {label: 'Convênio Total', value: fmtBRcompact(r.convenioTotal), detail: 'Plano: ' + fmtBRcompact(r.planoTotal), cls: 'gold'},
    {label: 'Empenhado', value: fmtBRcompact(r.empenhado), detail: fmtPct(r.execPct) + ' do plano', cls: ''},
    {label: 'Liquidado', value: fmtBRcompact(r.liquidado), detail: 'A liquidar: ' + fmtBRcompact(r.aLiquidar), cls: ''},
    {label: 'Pago', value: fmtBRcompact(r.pago), detail: 'A pagar: ' + fmtBRcompact(r.aPagar), cls: 'positivo'},
    {label: saldoLabel, value: fmtBRcompact(saldoValue), detail: saldoDetail, cls: saldoValue < 0 ? '' : 'positivo'}
  ];
  
  document.getElementById('kpis-principais').innerHTML = kpis.map(k => 
    `<div class="kpi ${k.cls}"><div class="kpi-label">${k.label}</div><div class="kpi-value">${k.value}</div><div class="kpi-detail">${k.detail}</div></div>`
  ).join('');
}

function renderTabelaElementos() {
  const dados = calcularPorElemento();
  document.getElementById('tabela-meta').textContent = dados.length + ' registros';
  
  if (dados.length === 0) {
    document.getElementById('tbody-elementos').innerHTML = '<tr><td colspan="10" style="text-align:center; padding: 40px; color: var(--texto-mute);">Sem registros</td></tr>';
    return;
  }
  
  const visao = state.filtros.visao;
  const tbody = document.getElementById('tbody-elementos');
  
  tbody.innerHTML = dados.map(d => {
    const pct = d.execPct;
    const barClass = pct < 0.5 ? 'bar-low' : pct < 0.85 ? 'bar-mid' : 'bar-high';
    let saldo = visao === 'contabil' ? d.saldoContabil : visao === 'financeira' ? d.saldoFinanceira : d.saldoAbsoluto;
    
    const fonteTag = 'tag-' + d.fonte.toLowerCase();
    const tipoTag = 'tag-' + d.tipoDespesa.toLowerCase();
    
    return '<tr>' +
      `<td><span class="tag ${fonteTag}">${d.fonte}</span></td>` +
      `<td class="code">${d.elemento}</td>` +
      `<td>${d.descricao}</td>` +
      `<td><span class="tag ${tipoTag}">${d.tipoDespesa}</span></td>` +
      `<td class="num">${fmtBR(d.valor)}</td>` +
      `<td class="num">${fmtBR(d.empenhado)}</td>` +
      `<td class="num">${fmtBR(d.liquidado)}</td>` +
      `<td class="num">${fmtBR(d.pago)}</td>` +
      `<td class="num" style="font-weight:600; color: ${saldo < 0 ? '#8B1A1A' : '#6B5B3A'};">${fmtBR(saldo)}</td>` +
      `<td><span class="pct-mini">${fmtPct(pct)}</span><div class="bar-mini"><div class="bar-fill ${barClass}" style="width: ${Math.min(pct*100, 100)}%"></div></div></td>` +
      '</tr>';
  }).join('');
}

function renderContratos() {
  const contratos = state.data.contratos;
  document.getElementById('contratos-meta').textContent = contratos.length + ' contratos';
  
  if (contratos.length === 0) {
    document.getElementById('tbody-contratos').innerHTML = '<tr><td colspan="7" style="text-align:center; padding: 40px; color: var(--texto-mute);">Sem contratos</td></tr>';
    return;
  }
  
  const hoje = new Date();
  hoje.setHours(0,0,0,0);
  
  const tbody = document.getElementById('tbody-contratos');
  tbody.innerHTML = contratos.map(c => {
    const elemento = getField(c, 'ELEMENTO') || '';
    const empresa = getField(c, 'EMPRESA') || '';
    const objeto = String(getField(c, 'OBJETO') || '');
    const fimStr = getField(c, 'DATA FIM VIGÊNCIA', 'FIM VIGÊNCIA', 'FIM DA VIGÊNCIA') || '';
    const valorTotal = num(getField(c, 'VALOR TOTAL'));
    
    let dias = null;
    if (fimStr) {
      const fim = new Date(fimStr);
      if (!isNaN(fim.getTime())) dias = Math.floor((fim - hoje) / (1000 * 60 * 60 * 24));
    }
    
    let statusTag = 'tag-vigente';
    let statusLabel = '🟢 VIGENTE';
    
    if (dias === null) { statusTag = ''; statusLabel = 'Sem data'; }
    else if (dias <= 30) { statusTag = 'tag-vermelho'; statusLabel = dias < 0 ? '🔴 VENCIDO' : '🔴 ≤30 DIAS'; }
    else if (dias <= 60) { statusTag = 'tag-laranja'; statusLabel = '🟠 ≤60 DIAS'; }
    
    const fimDisplay = fimStr ? new Date(fimStr).toLocaleDateString('pt-BR') : '-';
    
    return '<tr>' +
      `<td class="code">${elemento}</td>` +
      `<td>${empresa}</td>` +
      `<td style="max-width:240px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${objeto}</td>` +
      `<td class="code">${fimDisplay}</td>` +
      `<td class="num"><strong>${dias !== null ? dias : '-'}</strong></td>` +
      `<td class="num">${fmtBR(valorTotal)}</td>` +
      `<td><span class="tag ${statusTag}">${statusLabel}</span></td>` +
      '</tr>';
  }).join('');
}

function renderCharts() {
  const dados = calcularPorElemento();
  const porElem = {};
  dados.forEach(d => {
    const key = d.elemento;
    if (!porElem[key]) porElem[key] = { desc: d.descricao || d.elemento, plano:0, empenhado:0, pago:0 };
    porElem[key].plano += d.valor;
    porElem[key].empenhado += d.empenhado;
    porElem[key].pago += d.pago;
  });
  
  const items = Object.values(porElem).sort((a,b) => b.plano - a.plano);
  const labels = items.map(i => String(i.desc).substring(0, 30));
  
  if (chartElementos) chartElementos.destroy();
  if (items.length > 0) {
    chartElementos = new Chart(document.getElementById('chart-elementos'), {
      type: 'bar',
      data: {
        labels,
        datasets: [
          { label: 'Plano', data: items.map(i => i.plano), backgroundColor: '#C4B287' },
          { label: 'Empenhado', data: items.map(i => i.empenhado), backgroundColor: '#A08F63' },
          { label: 'Pago', data: items.map(i => i.pago), backgroundColor: '#373435' },
        ]
      },
      options: { 
        responsive: true, 
        maintainAspectRatio: false, 
        indexAxis: 'y', 
        plugins: { legend: { position: 'bottom' } }, 
        scales: { x: { ticks: { callback: v => fmtBRcompact(v) } } } 
      }
    });
  }
  
  const porTipo = { CONTRATUAL: 0, ESSENCIAL: 0 };
  dados.forEach(d => { if (porTipo[d.tipoDespesa] !== undefined) porTipo[d.tipoDespesa] += d.valor; });
  
  if (chartTipos) chartTipos.destroy();
  chartTipos = new Chart(document.getElementById('chart-tipos'), {
    type: 'doughnut',
    data: { 
      labels: ['Contratual', 'Essencial'], 
      datasets: [{ 
        data: [porTipo.CONTRATUAL, porTipo.ESSENCIAL], 
        backgroundColor: ['#A08F63', '#373435'], 
        borderWidth: 2, 
        borderColor: '#FFF' 
      }] 
    },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } }, cutout: '60%' }
  });
}

function atualizarVisualizacao() {
  renderKPIs();
  renderTabelaElementos();
  renderContratos();
  renderCharts();
}

window.addEventListener('load', carregarDados);
</script>
