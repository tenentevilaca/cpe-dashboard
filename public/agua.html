<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consumo de Água — CPE 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+Pro:wght@600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="/vendor/chart.umd.js"></script>
<style>
:root{--preto:#373435;--dourado:#A08F63;--dourado-claro:#C4B287;--bg:#FAF8F3;--bg-card:#FFFFFF;--bg-soft:#F2EFE6;--texto:#373435;--texto-soft:#5A5A5A;--texto-mute:#8A8A8A;--linha:#E0DCD0;--positivo:#6B5B3A;--aviso:#B47B2A;--perigo:#8B1A1A;--sombra:0 1px 3px rgba(55,52,53,.04),0 4px 16px rgba(55,52,53,.04);
--normal:#2E7D32;--n1:#F9A825;--n2:#EF6C00;--n3:#C62828}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--texto);line-height:1.5;min-height:100vh}
.header{background:var(--preto);color:#FFF;padding:20px 40px;border-bottom:3px solid var(--dourado)}
.header-top{display:flex;justify-content:space-between;align-items:center;max-width:1600px;margin:0 auto;gap:24px}
.header-escudo{width:90px;height:90px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.header-escudo img{width:100%;height:100%;object-fit:contain}
.header-info h1{font-family:'Source Serif Pro',serif;font-size:26px;color:#FFF}
.header-info .subtitle{font-size:12px;opacity:.8;text-transform:uppercase;letter-spacing:.5px;color:var(--dourado-claro)}
.header-actions{display:flex;align-items:center;gap:12px}
.nav-link{background:transparent;color:var(--dourado-claro);border:1px solid var(--dourado-claro);padding:9px 16px;border-radius:4px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;text-decoration:none;display:inline-block}
.nav-link:hover{background:rgba(196,178,135,.15)}
.refresh-btn{background:var(--dourado);color:var(--preto);border:none;padding:10px 18px;border-radius:4px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.refresh-btn:hover{background:var(--dourado-claro)}
.last-update{font-size:10px;color:#FFF;opacity:.75;font-family:'JetBrains Mono',monospace;margin-top:4px;text-align:right}
.status-line{background:rgba(255,255,255,.08);padding:8px 40px;text-align:center;font-size:11px;color:#FFF;font-family:'JetBrains Mono',monospace}
.status-line.error{background:var(--perigo)}.status-line.success{background:rgba(160,143,99,.4)}
.main{max-width:1600px;margin:0 auto;padding:28px 40px}
.tabs-nav{display:flex;gap:4px;border-bottom:2px solid var(--linha);margin-bottom:24px;flex-wrap:wrap}
.tab-btn{background:transparent;border:none;padding:12px 20px;font-size:13px;font-weight:600;color:var(--texto-soft);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;font-family:inherit}
.tab-btn.active{color:var(--preto);border-bottom-color:var(--dourado)}
.tab-content{display:none}.tab-content.active{display:block}
.filtro-bar{background:var(--bg-card);border:1px solid var(--linha);border-radius:6px;padding:16px 20px;margin-bottom:20px;display:flex;gap:20px;align-items:flex-end;flex-wrap:wrap;box-shadow:var(--sombra)}
.fg{display:flex;flex-direction:column;gap:6px}
.fg label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--texto-mute)}
.fg select{background:var(--bg);border:1px solid var(--linha);padding:8px 12px;border-radius:4px;font-size:13px;color:var(--texto);cursor:pointer;font-family:inherit;min-width:180px}
.section-title{font-family:'Source Serif Pro',serif;font-size:20px;font-weight:700;margin:32px 0 16px;padding-bottom:8px;border-bottom:2px solid var(--dourado);display:flex;align-items:baseline;gap:12px;color:var(--texto)}
.section-title:first-child{margin-top:0}
.section-num{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--dourado)}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.kpi-grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.kpi-grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.kpi{background:var(--bg-card);border:1px solid var(--linha);border-radius:6px;padding:18px 20px;box-shadow:var(--sombra);position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--preto)}
.kpi.gold::before{background:var(--dourado)}.kpi.positivo::before{background:var(--normal)}
.kpi.n1::before{background:var(--n1)}.kpi.n2::before{background:var(--n2)}.kpi.n3::before{background:var(--n3)}
.kpi-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--texto-mute);margin-bottom:6px}
.kpi-value{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:600;color:var(--texto);margin-bottom:4px;word-break:break-word}
.kpi-value.alerta{color:var(--n3)}.kpi-value.av{color:var(--n2)}
.kpi-detail{font-size:11px;color:var(--texto-soft)}
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.charts-grid-2-1{display:grid;grid-template-columns:2fr 1fr;gap:16px}
.chart-card{background:var(--bg-card);border:1px solid var(--linha);border-radius:6px;padding:20px 24px;box-shadow:var(--sombra)}
.chart-title{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--texto-soft);margin-bottom:16px}
.chart-container{position:relative;height:340px}
.chart-container.tall{height:460px}
.table-card{background:var(--bg-card);border:1px solid var(--linha);border-radius:6px;overflow:hidden;box-shadow:var(--sombra);margin-top:16px}
.table-header{padding:18px 24px;border-bottom:1px solid var(--linha);display:flex;justify-content:space-between;align-items:center}
.table-header h3{font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--texto-soft)}
.table-meta{font-size:11px;color:var(--texto-mute);font-family:'JetBrains Mono',monospace}
table{width:100%;border-collapse:collapse;font-size:13px}
thead{background:var(--bg-soft)}
th{padding:12px 14px;text-align:left;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--texto-soft);border-bottom:1px solid var(--linha);white-space:nowrap}
th.num{text-align:right}
td{padding:10px 14px;border-bottom:1px solid var(--linha);color:var(--texto)}
td.num{text-align:right;font-family:'JetBrains Mono',monospace;font-size:12px}
td.code{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--texto-soft)}
tbody tr:hover{background:var(--bg-soft)}
tr.row-n1{background:#FFF9C4}tr.row-n2{background:#FFE0B2}tr.row-n3{background:#FFCDD2}
.tag{display:inline-block;padding:3px 9px;border-radius:3px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
.tag-verde{background:#C8E6C9;color:#1B5E20;border:1px solid #66BB6A}
.tag-n1{background:#FFF9C4;color:#5D4E00;border:1px solid #FBC02D;font-weight:700}
.tag-n2{background:#FFE0B2;color:#E65100;border:1px solid #FB8C00;font-weight:700}
.tag-n3{background:#C62828;color:#FFF;border:1px solid #8B1A1A;font-weight:700}
.bar-mini{width:100%;height:5px;background:var(--bg-soft);border-radius:3px;overflow:hidden;margin-top:4px}
.bar-fill{height:100%}.bar-low{background:var(--normal)}.bar-n1{background:var(--n1)}.bar-n2{background:var(--n2)}.bar-n3{background:var(--n3)}
.pct-mini{font-size:10px;color:var(--texto-mute);font-family:'JetBrains Mono',monospace}
.legend-criterios{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px}
.legend-item{display:flex;align-items:center;gap:8px;background:var(--bg-card);border:1px solid var(--linha);border-radius:6px;padding:10px 16px;font-size:12px;box-shadow:var(--sombra)}
.legend-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.footer{max-width:1600px;margin:40px auto 0;padding:24px 40px 32px;border-top:1px solid var(--linha);font-size:11px;color:var(--texto-mute);text-align:center}
@media(max-width:1200px){.kpi-grid,.kpi-grid-4{grid-template-columns:repeat(2,1fr)}.charts-grid,.charts-grid-2-1{grid-template-columns:1fr}}
@media(max-width:768px){.header,.main,.status-line{padding-left:20px;padding-right:20px}.kpi-grid,.kpi-grid-3,.kpi-grid-4{grid-template-columns:1fr}.header-top{flex-wrap:wrap}}
</style>
</head>

    {label:'ALERTA NÍVEL 1 (10% a 30%)', tag:'tag-n1', bar:'bar-n1', row:'row-n1', emoji:'🟡', cor:'#F9A825'},
    {label:'ALERTA NÍVEL 2 (31% a 50%)', tag:'tag-n2', bar:'bar-n2', row:'row-n2', emoji:'🟠', cor:'#EF6C00'},
    {label:'ALERTA CRÍTICO (acima de 50%)', tag:'tag-n3', bar:'bar-n3', row:'row-n3', emoji:'🔴', cor:'#C62828'}
  ][t];
}

async function carregar(){
  setStatus('Buscando dados das leituras...','');
  try{
    const r = await fetch('/api/agua');
    D = await r.json();
    if(D.status==='erro') throw new Error(D.msg||'erro');
    setStatus('✓ Dados carregados com sucesso','success');
    document.getElementById('upd').textContent='Atualizado: '+new Date().toLocaleString('pt-BR');
    render();
  }catch(e){ setStatus('⚠ Erro: '+e.message,'error'); }
}
function setStatus(m,t){const e=document.getElementById('status');e.textContent=m;e.className='status-line '+t;}
function destroyCharts(){ Object.values(charts).forEach(c=>{try{c.destroy()}catch(e){}}); charts={}; }

function render(){
  document.getElementById('main').innerHTML = `
    <div class="tabs-nav">
      <button class="tab-btn active" data-t="visao">📊 Visão Geral</button>
      <button class="tab-btn" data-t="unidades">💧 Unidades</button>
      <button class="tab-btn" data-t="leituras">📄 Histórico de Leituras</button>
      <button class="tab-btn" data-t="criterios">⚙️ Critérios de Alerta</button>
    </div>
    <div class="tab-content active" id="t-visao"></div>
    <div class="tab-content" id="t-unidades"></div>
    <div class="tab-content" id="t-leituras"></div>
    <div class="tab-content" id="t-criterios"></div>
    <footer class="footer">Painel de Consumo de Água — CPE 2026 · Controle de Hidrômetros por Fração · Simulação de acompanhamento mensal</footer>
  `;
  document.querySelectorAll('.tab-btn').forEach(b=>b.addEventListener('click',e=>{
    document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(x=>x.classList.remove('active'));
    e.target.classList.add('active');
    document.getElementById('t-'+e.target.dataset.t).classList.add('active');
  }));
  renderVisao();
  renderUnidades();
  renderLeituras();
  renderCriterios();
}

// ===== ABA VISÃO GERAL =====
function renderVisao(){
  const us = D.unidades;
  const totalConsumoAtual = us.reduce((s,u)=>s+u.consumoAtual,0);
  const totalConsumoAnterior = us.reduce((s,u)=>s+u.consumoAnterior,0);
  const contagem = [0,0,0,0];
  us.forEach(u=>contagem[u.tier]++);
  const totalAlertas = contagem[1]+contagem[2]+contagem[3];
  const pior = [...us].sort((a,b)=>b.variacaoAtual-a.variacaoAtual)[0];

  document.getElementById('t-visao').innerHTML = `
    <h2 class="section-title"><span class="section-num">01</span>Resumo Geral do Consumo</h2>
    <div class="kpi-grid-4">
      <div class="kpi gold"><div class="kpi-label">Unidades Monitoradas</div><div class="kpi-value">${us.length}</div><div class="kpi-detail">Frações com hidrômetro cadastrado</div></div>
      <div class="kpi"><div class="kpi-label">Consumo Total Atual</div><div class="kpi-value">${fmtM3(totalConsumoAtual)}</div><div class="kpi-detail">Mês corrente · anterior: ${fmtM3(totalConsumoAnterior)}</div></div>
      <div class="kpi ${totalAlertas>0?'n2':'positivo'}"><div class="kpi-label">Alertas Ativos</div><div class="kpi-value ${totalAlertas>0?'alerta':''}">${totalAlertas}</div><div class="kpi-detail">${contagem[1]} nível 1 · ${contagem[2]} nível 2 · ${contagem[3]} crítico</div></div>
      <div class="kpi n3"><div class="kpi-label">Maior Variação Registrada</div><div class="kpi-value alerta">${fmtPct(pior.variacaoAtual)}</div><div class="kpi-detail">${pior.fracao}</div></div>
    </div>

    <h2 class="section-title"><span class="section-num">02</span>Distribuição de Alertas por Nível</h2>
    <div class="kpi-grid-4">
      <div class="kpi positivo"><div class="kpi-label">🟢 Consumo Normal (&lt;10%)</div><div class="kpi-value">${contagem[0]}</div><div class="kpi-detail">Dentro da variação esperada</div></div>
      <div class="kpi n1"><div class="kpi-label">🟡 Alerta Nível 1 (10% a 30%)</div><div class="kpi-value">${contagem[1]}</div><div class="kpi-detail">Atenção · monitorar próxima leitura</div></div>
      <div class="kpi n2"><div class="kpi-label">🟠 Alerta Nível 2 (31% a 50%)</div><div class="kpi-value">${contagem[2]}</div><div class="kpi-detail">Investigar possível vazamento</div></div>
      <div class="kpi n3"><div class="kpi-label">🔴 Alerta Crítico (acima de 50%)</div><div class="kpi-value ${contagem[3]>0?'alerta':''}">${contagem[3]}</div><div class="kpi-detail">Ação imediata recomendada</div></div>
    </div>

    <h2 class="section-title"><span class="section-num">03</span>Visão Consolidada</h2>
    <div class="charts-grid">
      <div class="chart-card"><div class="chart-title">Variação de Consumo por Unidade (%)</div><div id="var-nota" style="font-size:11px;color:var(--texto-mute);margin:-10px 0 12px"></div><div class="chart-container tall"><canvas id="ch-var"></canvas></div></div>
      <div class="chart-card"><div class="chart-title">Distribuição de Alertas</div><div class="chart-container tall"><canvas id="ch-dist"></canvas></div></div>
    </div>
  `;

  const ordenado = [...us].sort((a,b)=>a.variacaoAtual-b.variacaoAtual);
  const EIXO_MAX = 100;
  const valoresReais = ordenado.map(u=>+(u.variacaoAtual*100).toFixed(1));
  const valoresGrafico = valoresReais.map(v=>Math.min(v,EIXO_MAX));
  const truncados = ordenado.filter((u,i)=>valoresReais[i]>EIXO_MAX);
  document.getElementById('var-nota').textContent = truncados.length
    ? '⚠ '+truncados.map(u=>u.fracao).join(', ')+' com variação real acima de '+EIXO_MAX+'% — barra truncada, passe o mouse para ver o valor exato.'
    : '';
  try{
    charts.var = new Chart(document.getElementById('ch-var'),{
      type:'bar',
      data:{labels:ordenado.map(u=>u.fracao), datasets:[{
        label:'Variação (%)',
        data:valoresGrafico,
        backgroundColor:ordenado.map(u=>tierInfo(u.tier).cor)
      }]},
      options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',
        plugins:{legend:{display:false},tooltip:{callbacks:{label:x=>'Variação real: '+valoresReais[x.dataIndex].toLocaleString('pt-BR',{minimumFractionDigits:1})+'%'}}},
        scales:{x:{max:EIXO_MAX,ticks:{callback:v=>v+'%'}}}
      }
    });

    charts.dist = new Chart(document.getElementById('ch-dist'),{
      type:'doughnut',
      data:{labels:['Normal (<10%)','Nível 1 (10-30%)','Nível 2 (31-50%)','Crítico (>50%)'],
        datasets:[{data:contagem,backgroundColor:['#2E7D32','#F9A825','#EF6C00','#C62828'],borderWidth:2,borderColor:'#FFF'}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom'},tooltip:{callbacks:{label:x=>x.label+': '+x.parsed+' unidade(s)'}}},cutout:'60%'}
    });
  }catch(e){ console.error('Chart indisponível:', e); }
}

// ===== ABA UNIDADES =====
function renderUnidades(){
  const el = document.getElementById('t-unidades');
  el.innerHTML = `
    <div class="filtro-bar">
      <div class="fg"><label>Nível de Alerta</label><select id="fu-tier">
        <option value="TODOS">Todos os níveis</option>
        <option value="3">🔴 Crítico (acima de 50%)</option>
        <option value="2">🟠 Nível 2 (31% a 50%)</option>
        <option value="1">🟡 Nível 1 (10% a 30%)</option>
        <option value="0">🟢 Normal (abaixo de 10%)</option>
      </select></div>
    </div>
    <h2 class="section-title"><span class="section-num">U1</span>Consumo Atual × Anterior por Unidade</h2>
    <div class="chart-card"><div class="chart-title">Comparativo de Consumo Mensal (m³)</div><div class="chart-container tall"><canvas id="ch-comp"></canvas></div></div>
    <h2 class="section-title"><span class="section-num">U2</span>Situação de Cada Fração</h2>
    <div id="unidades-tabela"></div>
  `;
  document.getElementById('fu-tier').addEventListener('change',atualizarUnidades);
  atualizarUnidades();
}

function atualizarUnidades(){
  const filtro = document.getElementById('fu-tier').value;
  let us = [...D.unidades];
  if(filtro!=='TODOS') us = us.filter(u=>String(u.tier)===filtro);
  us.sort((a,b)=>b.variacaoAtual-a.variacaoAtual);

  try{
    if(charts.comp) charts.comp.destroy();
    charts.comp = new Chart(document.getElementById('ch-comp'),{
      type:'bar',
      data:{labels:us.map(u=>u.fracao),datasets:[
        {label:'Consumo Anterior',data:us.map(u=>u.consumoAnterior),backgroundColor:'#C4B287'},
        {label:'Consumo Atual',data:us.map(u=>u.consumoAtual),backgroundColor:us.map(u=>tierInfo(u.tier).cor)}
      ]},
      options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',
        plugins:{legend:{position:'bottom'},tooltip:{callbacks:{label:x=>x.dataset.label+': '+fmtM3(x.parsed.x)}}},
        scales:{x:{ticks:{callback:v=>v+' m³'}}}
      }
    });
  }catch(e){ console.error('Chart indisponível:', e); }

  let html='<div class="table-card"><div class="table-header"><h3>Frações Cadastradas</h3><span class="table-meta">'+us.length+' unidade(s)</span></div><div style="overflow-x:auto;max-height:560px"><table><thead><tr><th>Status</th><th>Fração</th><th class="num">Consumo Anterior</th><th class="num">Consumo Atual</th><th class="num">Variação</th><th>Última Leitura</th></tr></thead><tbody>';
  us.forEach(u=>{
    const ti = tierInfo(u.tier);
    const pctBar = Math.min(100, Math.abs(u.variacaoAtual)*100);
    html+='<tr class="'+ti.row+'"><td><span class="tag '+ti.tag+'">'+ti.emoji+' '+ti.label+'</span></td>'
      +'<td><strong>'+u.fracao+'</strong></td>'
      +'<td class="num">'+fmtM3(u.consumoAnterior)+'</td>'
      +'<td class="num">'+fmtM3(u.consumoAtual)+'</td>'
      +'<td class="num"><strong>'+fmtPct(u.variacaoAtual)+'</strong><div class="bar-mini"><div class="bar-fill '+ti.bar+'" style="width:'+pctBar+'%"></div></div></td>'
      +'<td class="code">'+fmtData(u.leituras[u.leituras.length-1].data)+'</td></tr>';
  });
  html+='</tbody></table></div></div>';
  document.getElementById('unidades-tabela').innerHTML=html;
}

// ===== ABA LEITURAS (histórico) =====
function renderLeituras(){
  const el = document.getElementById('t-leituras');
  el.innerHTML = `
    <div class="filtro-bar">
      <div class="fg"><label>Fração</label><select id="fl-fracao"><option value="TODAS">Todas as Frações</option>
        ${D.unidades.map(u=>'<option value="'+u.fracao+'">'+u.fracao+'</option>').join('')}
      </select></div>
    </div>
    <h2 class="section-title"><span class="section-num">L1</span>Todos os Lançamentos de Leitura</h2>
    <div id="leituras-tabela"></div>
  `;
  document.getElementById('fl-fracao').addEventListener('change',atualizarLeituras);
  atualizarLeituras();
}

function atualizarLeituras(){
  const filtro = document.getElementById('fl-fracao').value;
  let linhas = [];
  D.unidades.forEach(u=>{
    if(filtro!=='TODAS' && u.fracao!==filtro) return;
    u.leituras.forEach(l=>linhas.push({...l, fracao:u.fracao, tier: l.variacao==null?-1: (l.variacao>=0.5?3:l.variacao>=0.31?2:l.variacao>=0.10?1:0)}));
  });
  linhas.sort((a,b)=> a.fracao===b.fracao ? a.data.localeCompare(b.data) : a.fracao.localeCompare(b.fracao));

  let html='<div class="table-card"><div class="table-header"><h3>Histórico de Leituras</h3><span class="table-meta">'+linhas.length+' lançamento(s)</span></div><div style="overflow-x:auto;max-height:600px"><table><thead><tr><th>Data</th><th>Fração</th><th class="num">Leitura Anterior</th><th class="num">Leitura Atual</th><th class="num">Consumo Atual</th><th class="num">Consumo Anterior</th><th class="num">Variação</th><th>Situação</th></tr></thead><tbody>';
  linhas.forEach(l=>{
    const ti = l.tier>=0 ? tierInfo(l.tier) : {tag:'',row:'',emoji:'ℹ️'};
    html+='<tr class="'+ti.row+'"><td class="code">'+fmtData(l.data)+'</td><td>'+l.fracao+'</td>'
      +'<td class="num">'+fmtM3(l.anterior)+'</td><td class="num">'+fmtM3(l.atual)+'</td>'
      +'<td class="num"><strong>'+fmtM3(l.consumoAtual)+'</strong></td>'
      +'<td class="num">'+(l.consumoAnterior==null?'—':fmtM3(l.consumoAnterior))+'</td>'
      +'<td class="num">'+(l.variacao==null?'—':fmtPct(l.variacao))+'</td>'
      +'<td>'+(l.tier>=0?'<span class="tag '+ti.tag+'">'+ti.emoji+' '+l.situacao+'</span>':'<span class="tag tag-verde">ℹ️ '+l.situacao+'</span>')+'</td></tr>';
  });
  html+='</tbody></table></div></div>';
  document.getElementById('leituras-tabela').innerHTML=html;
}

// ===== ABA CRITÉRIOS =====
function renderCriterios(){
  const el = document.getElementById('t-criterios');
  const c = D.criterios;
  el.innerHTML = `
    <h2 class="section-title"><span class="section-num">C1</span>Critérios de Classificação de Alerta</h2>
    <p style="color:var(--texto-soft);margin-bottom:20px;max-width:820px">A situação de cada fração é calculada comparando o <strong>consumo do mês atual</strong> com o <strong>consumo do mês anterior</strong> registrado no mesmo hidrômetro. Quanto maior o aumento percentual, maior o nível de alerta — o que pode indicar vazamentos, uso irregular ou falha no equipamento.</p>
    <div class="legend-criterios">
      <div class="legend-item"><span class="legend-dot" style="background:#2E7D32"></span><strong>Normal</strong>&nbsp;— variação abaixo de ${fmtPct(c.nivel1)}</div>
      <div class="legend-item"><span class="legend-dot" style="background:#F9A825"></span><strong>Alerta Nível 1</strong>&nbsp;— de ${fmtPct(c.nivel1)} até 30%</div>
      <div class="legend-item"><span class="legend-dot" style="background:#EF6C00"></span><strong>Alerta Nível 2</strong>&nbsp;— de 31% até 50%</div>
      <div class="legend-item"><span class="legend-dot" style="background:#C62828"></span><strong>Alerta Crítico</strong>&nbsp;— acima de 50%</div>
    </div>
    <h2 class="section-title"><span class="section-num">C2</span>Unidades em Situação Crítica</h2>
    <div id="criticos-lista"></div>
  `;
  const criticos = D.unidades.filter(u=>u.tier===3).sort((a,b)=>b.variacaoAtual-a.variacaoAtual);
  if(criticos.length===0){
    document.getElementById('criticos-lista').innerHTML = '<div class="kpi positivo"><div class="kpi-label">Situação</div><div class="kpi-value">Nenhuma unidade em alerta crítico</div></div>';
  } else {
    document.getElementById('criticos-lista').innerHTML = '<div class="kpi-grid-3">'+criticos.map(u=>
      `<div class="kpi n3"><div class="kpi-label">${u.fracao}</div><div class="kpi-value alerta">${fmtPct(u.variacaoAtual)}</div><div class="kpi-detail">${fmtM3(u.consumoAnterior)} → ${fmtM3(u.consumoAtual)}</div></div>`
    ).join('')+'</div>';
  }
}

window.addEventListener('load',carregar);
</script>
</body>
</html>
